# The reality-validation gate (eval/reality-corpus/, see its README.md).
#
# Kept as a SEPARATE workflow from ci.yml deliberately (AGENT-CONTEXT-PACK-2026-07-19.md): the corpus
# scorecard measures the engine against hand-verified real sites, not against the team's own assumptions
# (that is what the rest of the fleet in ci.yml does). A truthful red scorecard here is DATA about the
# engine's current state, not a fleet failure, so this workflow never blocks a merge on the scorecard
# itself - only on the corpus format being well-formed (--lint). The scorecard step instead reports its
# numbers loudly (job summary + uploaded JSON artifact) so a PR that makes the honest number WORSE is
# visible to reviewers even though CI stays green; ratcheting eval/reality-corpus/budgets.json's
# coverage_adjusted_recall_min upward (with a dated baseline_history[] entry) is how a genuine
# improvement gets locked in as the new floor.
name: Reality corpus

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: reality-corpus-${{ github.ref }}
  cancel-in-progress: true

jobs:
  corpus:
    name: Reality-validation gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # persist-credentials: false - this job never pushes/pulls with the checked-out repo again after
      # checkout, so there is no reason for the GITHUB_TOKEN to remain in local git config for the rest
      # of the job (CodeRabbit PR #32, zizmor artipacked finding).
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Corpus format lint (BLOCKING - a malformed corpus file is a bug in this harness's own inputs)
        run: node eval/reality-corpus/run.js --lint

      # A glob, not a bare directory path: `node --test eval/reality-corpus/` resolves the directory
      # itself as a CJS module specifier and throws MODULE_NOT_FOUND (reproduces on Node 24 and 26) -
      # node's test runner only auto-discovers test files under a *directory* it is not itself asked to
      # `require()`. The quoted `**/*.test.js` glob is node --test's own supported pattern syntax (kept
      # quoted so bash never expands `**` itself first) and is what actually finds yaml.test.js,
      # metrics.test.js and run.test.js.
      - name: Corpus harness unit tests (yaml.js, metrics.js, run.js - BLOCKING, these are ordinary node:test suites)
        run: node --test "eval/reality-corpus/**/*.test.js"

      # catalogue.v1.json is gitignored and required by applicability/connect.js + the breach lane the
      # same way ci.yml's own "Catalogue compile" step is - see that step's comment for the fresh-clone
      # order-dependency this fixes (C-201).
      - name: Catalogue compile (release stamp from the committed RELEASE_STAMP file)
        run: npm run catalogue

      # INFORMATIONAL (see this workflow's header comment): never blocks the merge. `set -o pipefail` +
      # the explicit JSON re-parse afterwards exist so a hard crash of the node process (which `tee`
      # alone would happily let through as a truncated/empty file with a misleadingly "successful" tee
      # exit code) is told apart from a real, honestly-scored budget miss - both are still non-blocking,
      # but the two must not be reported as the same thing (CodeRabbit PR #32).
      - name: "Reality-corpus scorecard (INFORMATIONAL - see this workflow's header comment: never blocks the merge, always reported)"
        id: scorecard
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node eval/reality-corpus/run.js --json | tee reality-corpus-result.json

      - name: Validate the scorecard JSON actually parses (distinguishes a crash from a budget miss)
        id: scorecard_json
        if: always()
        run: |
          set +e
          if [ ! -s reality-corpus-result.json ]; then
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "reason=reality-corpus-result.json was never produced (the runner crashed before writing output)" >> "$GITHUB_OUTPUT"
          elif ! node -e "JSON.parse(require('fs').readFileSync('reality-corpus-result.json','utf8'))" 2>/dev/null; then
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "reason=reality-corpus-result.json is not valid JSON (the runner produced truncated/corrupt output)" >> "$GITHUB_OUTPUT"
          else
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "reason=" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Human-readable scorecard in the job summary
        if: always()
        run: node eval/reality-corpus/run.js >> "$GITHUB_STEP_SUMMARY" 2>&1 || true

      - name: Upload scorecard artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: reality-corpus-scorecard
          path: reality-corpus-result.json
          retention-days: 90

      # Never fails the job (see header comment) - but a crashed/invalid runner output is reported as a
      # DIFFERENT, louder condition than an honest budget miss, and a genuine budget miss is reported
      # with the SPECIFIC metric(s) that missed (evaluateBudgets()'s own failure strings), not a generic
      # "something missed" line, so the regression a reviewer needs to see is in the annotation itself,
      # not only inside the uploaded artifact/job summary.
      - name: Report the honest result (never fails the job - see header comment)
        if: always()
        run: |
          set +e
          if [ "${{ steps.scorecard_json.outputs.valid }}" != "true" ]; then
            echo "::error title=reality-corpus::SCORECARD RUNNER FAILED: ${{ steps.scorecard_json.outputs.reason }}. This is NOT a budget miss and is not informational - it means the gate did not run at all; see the job's own step logs."
          elif [ "${{ steps.scorecard.outcome }}" = "success" ]; then
            echo "::notice title=reality-corpus::within budget (eval/reality-corpus/budgets.json)"
          else
            FAILURES="$(node -e "const r=require('./reality-corpus-result.json'); (r.verdict.failures||[]).forEach(f=>console.log('- '+f))" 2>/dev/null)"
            if [ -z "$FAILURES" ]; then FAILURES="- (evaluateBudgets reported no failure strings - see the uploaded artifact)"; fi
            echo "::warning title=reality-corpus::at least one budget missed (EXPECTED, does not fail CI - see this workflow's header comment; must not silently regress eval/reality-corpus/budgets.json's recorded baseline):%0A${FAILURES//$'\n'/%0A}"
          fi
          exit 0
