# CodeQL static analysis for JavaScript.
# Runs on every push and PR to main, plus a weekly deep pass.
# No secrets required: code scanning is free on public repos and uses the built-in GITHUB_TOKEN.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 4 * * 1' # weekly, Monday 04:30 UTC

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (javascript)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality
          config-file: ./.github/codeql/codeql-config.yml

      - name: Analyse
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'
