known_regression: "GRANULARITY NOTE (found while building this corpus, 2026-07-20): facts/jurisdiction.js emits only country-level codes ('US', 'UK'), never a sub_jurisdiction/state axis, even when the tier-B evidence (a Texas postcode, an area-code phone) is state-specific - this is the Kimi K3 blueprint's JurisdictionAxes gap (section 2.3: 'a real tree ... { country, sub_jurisdiction (state/emirate/canton), regulator, profession }'), not yet built. establishment[].jurisdiction is therefore labelled 'US' in this file, not 'US-TX', to avoid this corpus scoring a granularity gap as a wrong-attach false positive; the state-level gap itself is real and is exactly why FL_BAR/CA_RPC/NY_RPC-family records (state-scoped) cannot yet attach even once jurisdiction binds at country level - see avidlawyers.yml/ask4sam.yml/seriousaccidents.yml's gate-6 established_in notes. sector correctly resolves healthcare/telemedicine, corroborated, correctly in scope. wave-1: whole audit REFUSED at the jurisdiction gate ('no bound jurisdiction resolved') despite an explicit, unambiguous US street address with a full ZIP code and area-code phone number on the firm's own homepage footer - a genuine facts/jurisdiction.js defect (the sentence-level office-address detector never saw this address as address-context, and the phone number did not match the international-prefix-only phone detector), not a correctly-scoped-out site. engine-v2.1.5-p4 (#28) fixes this and US/TX now binds Tier-A from this exact address; the residual miss is Layer 3 (evidence): the pre-consent tracker-observation lane captured zero events on every real tracker-bearing page tested even after the bare-domain fix, root cause not fully isolated (defect C in healthcare-us.md)."
